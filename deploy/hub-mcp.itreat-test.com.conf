<VirtualHost _default_:80>
    ServerName hub-mcp.itreat-test.com

    CustomLog /var/log/apache2/hub-mcp.itreat-test.com.access.log combined
    ErrorLog  /var/log/apache2/hub-mcp.itreat-test.com.error.log

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R,L]
</VirtualHost>

<VirtualHost _default_:443>
    ServerName hub-mcp.itreat-test.com

    ErrorLog  /var/log/apache2/hub-mcp.itreat-test.com.error.log
    TransferLog /var/log/apache2/hub-mcp.itreat-test.com.transfer.log
    LogLevel warn

    Protocols h2 http/1.1

    SSLEngine on
    SSLProtocol all -SSLv2 -SSLv3
    SSLCompression off
    SSLHonorCipherOrder On
    SSLCipherSuite ECDHE-RSA-AES128-SHA256:AES128-GCM-SHA256:HIGH:MEDIUM:!aNULL:!MD5:!RC4

    SSLCertificateFile    /etc/letsencrypt/live/hub-mcp.itreat-test.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/hub-mcp.itreat-test.com/privkey.pem

    # Node.jsアプリへのリバースプロキシ
    ProxyPreserveHost On
    ProxyPass        / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # ── Basic認証（全体） ──────────────────────────────────
    <Location "/">
        AuthType Basic
        AuthName "hub-mcp"
        AuthUserFile /etc/apache2/htpasswd
        Require valid-user
    </Location>

    # ── OAuthコールバック：Basic認証除外 ───────────────────
    # ChatworkのリダイレクトがBasic認証に弾かれないようにする
    <Location "/oauth/chatwork/callback">
        AuthType None
        Require all granted
    </Location>
    <Location "/oauth/backlog/callback">
        AuthType None
        Require all granted
    </Location>

    # ── MCPエンドポイント：Basic認証除外 + SSE対応 ─────────
    # 独自トークン認証のため Basic認証不要
    # flushpackets=on でSSE（Server-Sent Events）を即時送信
    <Location "/mcp">
        AuthType None
        Require all granted
        ProxyPass http://localhost:3000/mcp flushpackets=on
        ProxyPassReverse http://localhost:3000/mcp
    </Location>

    BrowserMatch "MSIE [2-5]" nokeepalive ssl-unclean-shutdown downgrade-1.0 force-response-1.0
    CustomLog /var/log/apache2/hub-mcp.itreat-test.com.request.log "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"
</VirtualHost>
